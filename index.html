<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pipeline | Live Deployment</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
        }

        .status-badge {
            background-color: var(--success);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .pipeline-track {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            position: relative;
        }

        .step {
            font-size: 0.7rem;
            color: #64748b;
        }

        .step.active {
            color: var(--primary);
            font-weight: bold;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">● System Live</div>
        <h1>DevOps Portfolio</h1>
        <p>This project demonstrates a fully automated CI/CD pipeline. Every change made in VS Code is automatically built, tested, and deployed via GitHub Actions.</p>
        
        <div class="pipeline-track">
            <div class="step">CODE</div>
            <div class="step">➔</div>
            <div class="step">BUILD</div>
            <div class="step">➔</div>
            <div class="step active">DEPLOYED</div>
        </div>
    </div>

</body>
</html>
